name: calibre_agent
description: Calibre Agent - HTTPS REST API for your Calibre library
publish_to: none

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  bonsoir: ^6.0.2
  cupertino_icons: ^1.0.8
  file_picker: ^11.0.2
  flutter_riverpod: ^3.0.1
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  sqlite3: ^3.3.1
  sqlite3_flutter_libs: ^0.6.0+eol

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3


flutter_launcher_icons:
  image_path: assets/icon.png
  macos:
    generate: true
    image_path: assets/icon.png
  windows:
    generate: true
    image_path: assets/icon.png
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/icon_512.png
